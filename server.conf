# mini-httpd configuration
# Uncomment and modify values as needed

# Port to listen on
port = 8080

# Document root directory
root = www

# Maximum events per kevent loop iteration
max_events = 128

# Idle connection timeout (seconds)
timeout_seconds = 30

# Access log file path (overrides MINI_HTTPD_LOG env var)
log_file = /tmp/mini-httpd-access.log

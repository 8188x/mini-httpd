<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 · Not Found · mini-httpd</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#0b1121;color:#e2e8f0;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;background-image:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(239,68,68,0.06),transparent)}
.card{background:#0f172a;border:1px solid #1e293b;border-radius:12px;padding:56px;max-width:480px;text-align:center}
.code{font-size:5rem;font-weight:800;line-height:1;margin-bottom:4px;background:linear-gradient(135deg,#f87171,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.desc{color:#94a3b8;font-size:0.9rem;margin-bottom:8px}
.hint{color:#475569;font-size:0.75rem;margin-bottom:28px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 24px;font-size:0.85rem;font-weight:500;color:#e2e8f0;text-decoration:none;border:1px solid #334155;border-radius:8px;transition:all 0.15s}
.btn:hover{background:#1e293b;border-color:#475569}
.footer{color:#475569;font-size:0.7rem;margin-top:32px}
</style>
</head>
<body>
<div class="card">
  <div class="code">404</div>
  <p class="desc">The requested resource could not be found on this server.</p>
  <p class="hint">The file may have been moved, renamed, or never existed.</p>
  <a class="btn" href="/">← Back to Home</a>
  <div class="footer">mini-httpd · HTTP/1.1 · kqueue</div>
</div>
</body>
</html>
